<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CBT Admin Dashboard</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --card: #ffffff;
            --line: #dbe3f4;
            --primary: #1255cc;
            --danger: #c62d2d;
            --text: #1f2d4d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .topbar {
            position: sticky;
            top: 0;
            background: #0f2f6e;
            color: #fff;
            padding: 0.9rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .topbar h1 {
            margin: 0;
            font-size: 1.05rem;
        }

        .topbar button {
            background: #fff;
            color: #0f2f6e;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 0.8rem;
            cursor: pointer;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 1rem auto;
            padding: 0 1rem 2rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tab {
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 8px;
            padding: 0.55rem 0.9rem;
            cursor: pointer;
            font-weight: 600;
        }

        .tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 0.9rem;
            box-shadow: 0 4px 16px rgba(10, 40, 99, 0.06);
        }

        .card h3 {
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input,
        textarea,
        select,
        button {
            width: 100%;
            margin-top: 0.3rem;
            border-radius: 8px;
            border: 1px solid #cfdaf0;
            padding: 0.55rem;
            font: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button.primary {
            background: var(--primary);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        button.danger {
            background: var(--danger);
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .row {
            display: flex;
            gap: 0.5rem;
        }

        .row>* {
            flex: 1;
        }

        .list {
            max-height: 420px;
            overflow: auto;
        }

        .item {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            background: #fbfdff;
        }

        .item h4 {
            margin: 0 0 0.35rem;
        }

        .muted {
            color: #59709a;
            font-size: 0.85rem;
        }

        .status {
            margin-top: 0.8rem;
            padding: 0.6rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .status.ok {
            display: block;
            background: #e8f9ed;
            color: #1e7b3d;
        }

        .status.err {
            display: block;
            background: #ffecec;
            color: #a92b2b;
        }

        .answer-grid {
            margin-top: 0.5rem;
            display: grid;
            gap: 0.4rem;
        }

        .answer {
            border: 1px dashed #c9d7f3;
            border-radius: 8px;
            padding: 0.45rem;
            font-size: 0.82rem;
        }
    </style>
</head>

<body>
    <header class="topbar">
        <h1>CBT Admin Dashboard</h1>
        <button id="logoutBtn">Logout</button>
    </header>

    <main class="container">
        <div class="tabs">
            <button class="tab active" data-tab="sectionsPanel">Sections</button>
            <button class="tab" data-tab="questionsPanel">Questions</button>
            <button class="tab" data-tab="studentsPanel">Students & Results</button>
        </div>

        <section id="sectionsPanel" class="panel active">
            <div class="grid">
                <div class="card">
                    <h3>Create Section</h3>
                    <label>Section Name</label>
                    <input id="sectionName" placeholder="Aptitude" />
                    <label>Description</label>
                    <textarea id="sectionDescription" placeholder="Section details"></textarea>
                    <button id="createSectionBtn" class="primary">Create Section</button>
                </div>

                <div class="card">
                    <h3>All Sections</h3>
                    <div id="sectionsList" class="list"></div>
                </div>
            </div>
        </section>

        <section id="questionsPanel" class="panel">
            <div class="grid">
                <div class="card">
                    <h3>Create MCQ Question</h3>
                    <label>Section</label>
                    <select id="questionSectionSelect"></select>
                    <label>Question Text</label>
                    <textarea id="questionText"></textarea>
                    <label>Option 1</label>
                    <input id="opt1" />
                    <label>Option 2</label>
                    <input id="opt2" />
                    <label>Option 3</label>
                    <input id="opt3" />
                    <label>Option 4</label>
                    <input id="opt4" />
                    <div class="row">
                        <div>
                            <label>Correct Option Index (0-3)</label>
                            <input id="correctOptionIndex" type="number" min="0" max="3" value="0" />
                        </div>
                        <div>
                            <label>Marks</label>
                            <input id="questionMarks" type="number" min="1" value="1" />
                        </div>
                    </div>
                    <label>Question Image (optional)</label>
                    <input id="questionImage" type="file" accept="image/*" />
                    <button id="createQuestionBtn" class="primary">Create Question</button>
                </div>

                <div class="card">
                    <h3>Questions by Section</h3>
                    <label>Select Section</label>
                    <select id="questionSectionFilter"></select>
                    <button id="loadQuestionsBtn" class="primary">Load Questions</button>
                    <div id="questionsList" class="list" style="margin-top: 0.7rem;"></div>
                </div>
            </div>
        </section>

        <section id="studentsPanel" class="panel">
            <div class="grid">
                <div class="card">
                    <h3>Students</h3>
                    <button id="loadStudentsBtn" class="primary">Load Students</button>
                    <div id="studentsList" class="list" style="margin-top: 0.7rem;"></div>
                </div>

                <div class="card">
                    <h3>Student Submissions</h3>
                    <p class="muted">Select a student to view section-wise scores and answers.</p>
                    <div id="submissionsList" class="list"></div>
                </div>
            </div>
        </section>

        <div id="statusBox" class="status"></div>
    </main>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            location.href = '/admin/login';
        }

        const statusBox = document.getElementById('statusBox');
        const sectionsList = document.getElementById('sectionsList');
        const questionSectionSelect = document.getElementById('questionSectionSelect');
        const questionSectionFilter = document.getElementById('questionSectionFilter');
        const questionsList = document.getElementById('questionsList');
        const studentsList = document.getElementById('studentsList');
        const submissionsList = document.getElementById('submissionsList');

        const showStatus = (message, isError = false) => {
            statusBox.textContent = message;
            statusBox.className = `status ${isError ? 'err' : 'ok'}`;
        };

        const api = async (path, options = {}) => {
            const response = await fetch(path, {
                ...options,
                headers: {
                    Authorization: `Bearer ${token}`,
                    ...(options.headers || {})
                }
            });

            const data = await response.json();

            if (!response.ok || data.success === false) {
                throw new Error(data.message || 'Request failed');
            }

            return data;
        };

        const createElement = (tag, className, html) => {
            const el = document.createElement(tag);
            if (className) el.className = className;
            if (html) el.innerHTML = html;
            return el;
        };

        const setupTabs = () => {
            document.querySelectorAll('.tab').forEach((btn) => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach((b) => b.classList.remove('active'));
                    document.querySelectorAll('.panel').forEach((panel) => panel.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                });
            });
        };

        const renderSectionOptions = (sections) => {
            const optionHTML = sections
                .map((section) => `<option value="${section._id}">${section.name}</option>`)
                .join('');

            questionSectionSelect.innerHTML = optionHTML;
            questionSectionFilter.innerHTML = optionHTML;
        };

        const loadSections = async () => {
            const data = await api('/api/admin/sections');
            const sections = data.data || [];

            sectionsList.innerHTML = '';
            if (!sections.length) {
                sectionsList.innerHTML = '<p class="muted">No sections found.</p>';
                questionSectionSelect.innerHTML = '';
                questionSectionFilter.innerHTML = '';
                return;
            }

            renderSectionOptions(sections);

            sections.forEach((section) => {
                const item = createElement('div', 'item');
                item.innerHTML = `
            <h4>${section.name}</h4>
            <p class="muted">${section.description || 'No description'}</p>
            <p class="muted">Status: ${section.isActive ? 'Active' : 'Inactive'}</p>
          `;

                const row = createElement('div', 'row');
                const editBtn = createElement('button', 'primary', 'Update');
                const deleteBtn = createElement('button', 'danger', 'Delete');

                editBtn.addEventListener('click', async () => {
                    const newName = prompt('New section name', section.name);
                    if (!newName) return;
                    const newDescription = prompt('New description', section.description || '');
                    const activeInput = prompt('Active? yes/no', section.isActive ? 'yes' : 'no');
                    const isActive = String(activeInput || '').toLowerCase() !== 'no';

                    await api(`/api/admin/sections/${section._id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: newName, description: newDescription, isActive })
                    });
                    showStatus('Section updated successfully.');
                    await loadSections();
                });

                deleteBtn.addEventListener('click', async () => {
                    const ok = confirm(`Delete section: ${section.name}?`);
                    if (!ok) return;
                    await api(`/api/admin/sections/${section._id}`, { method: 'DELETE' });
                    showStatus('Section deleted successfully.');
                    await loadSections();
                    questionsList.innerHTML = '';
                });

                row.appendChild(editBtn);
                row.appendChild(deleteBtn);
                item.appendChild(row);
                sectionsList.appendChild(item);
            });
        };

        const createSection = async () => {
            const name = document.getElementById('sectionName').value.trim();
            const description = document.getElementById('sectionDescription').value.trim();

            if (!name) {
                showStatus('Section name is required.', true);
                return;
            }

            await api('/api/admin/sections', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description })
            });

            document.getElementById('sectionName').value = '';
            document.getElementById('sectionDescription').value = '';
            showStatus('Section created successfully.');
            await loadSections();
        };

        const createQuestion = async () => {
            const section = questionSectionSelect.value;
            const questionText = document.getElementById('questionText').value.trim();
            const options = [
                document.getElementById('opt1').value.trim(),
                document.getElementById('opt2').value.trim(),
                document.getElementById('opt3').value.trim(),
                document.getElementById('opt4').value.trim()
            ];
            const correctOptionIndex = Number(document.getElementById('correctOptionIndex').value);
            const marks = Number(document.getElementById('questionMarks').value || 1);
            const imageInput = document.getElementById('questionImage');

            if (!section || !questionText || options.some((opt) => !opt)) {
                showStatus('Fill section, question text, and all 4 options.', true);
                return;
            }

            const formData = new FormData();
            formData.append('section', section);
            formData.append('questionText', questionText);
            options.forEach((opt) => formData.append('options', opt));
            formData.append('correctOptionIndex', String(correctOptionIndex));
            formData.append('marks', String(marks));

            if (imageInput.files[0]) {
                formData.append('questionImage', imageInput.files[0]);
            }

            const response = await fetch('/api/admin/questions', {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}` },
                body: formData
            });

            const data = await response.json();
            if (!response.ok || data.success === false) {
                throw new Error(data.message || 'Failed to create question');
            }

            document.getElementById('questionText').value = '';
            document.getElementById('opt1').value = '';
            document.getElementById('opt2').value = '';
            document.getElementById('opt3').value = '';
            document.getElementById('opt4').value = '';
            document.getElementById('correctOptionIndex').value = '0';
            document.getElementById('questionMarks').value = '1';
            imageInput.value = '';

            showStatus('Question created successfully.');
        };

        const loadQuestions = async () => {
            const sectionId = questionSectionFilter.value;
            if (!sectionId) {
                showStatus('Select a section first.', true);
                return;
            }

            const data = await api(`/api/admin/questions/section/${sectionId}`);
            const questions = data.data || [];

            questionsList.innerHTML = '';
            if (!questions.length) {
                questionsList.innerHTML = '<p class="muted">No questions found in this section.</p>';
                return;
            }

            questions.forEach((question) => {
                const item = createElement('div', 'item');
                item.innerHTML = `
            <h4>${question.questionText}</h4>
            <p class="muted">Correct Option Index: ${question.correctOptionIndex}</p>
            <p class="muted">Marks: ${question.marks}</p>
            <div class="muted">Options:<br>${question.options.map((opt, i) => `${i}. ${opt}`).join('<br>')}</div>
          `;

                const row = createElement('div', 'row');
                const editBtn = createElement('button', 'primary', 'Update');
                const deleteBtn = createElement('button', 'danger', 'Delete');

                editBtn.addEventListener('click', async () => {
                    const newQuestionText = prompt('Question text', question.questionText);
                    if (!newQuestionText) return;
                    const newOpt1 = prompt('Option 0', question.options[0]);
                    const newOpt2 = prompt('Option 1', question.options[1]);
                    const newOpt3 = prompt('Option 2', question.options[2]);
                    const newOpt4 = prompt('Option 3', question.options[3]);
                    if (!newOpt1 || !newOpt2 || !newOpt3 || !newOpt4) return;
                    const newCorrect = prompt('Correct option index (0-3)', String(question.correctOptionIndex));
                    const newMarks = prompt('Marks', String(question.marks));

                    await api(`/api/admin/questions/${question._id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            section: sectionId,
                            questionText: newQuestionText,
                            options: [newOpt1, newOpt2, newOpt3, newOpt4],
                            correctOptionIndex: Number(newCorrect),
                            marks: Number(newMarks)
                        })
                    });

                    showStatus('Question updated successfully.');
                    await loadQuestions();
                });

                deleteBtn.addEventListener('click', async () => {
                    const ok = confirm('Delete this question?');
                    if (!ok) return;
                    await api(`/api/admin/questions/${question._id}`, { method: 'DELETE' });
                    showStatus('Question deleted successfully.');
                    await loadQuestions();
                });

                row.appendChild(editBtn);
                row.appendChild(deleteBtn);
                item.appendChild(row);
                questionsList.appendChild(item);
            });
        };

        const loadStudents = async () => {
            const data = await api('/api/admin/students');
            const students = data.data || [];

            studentsList.innerHTML = '';
            submissionsList.innerHTML = '';

            if (!students.length) {
                studentsList.innerHTML = '<p class="muted">No students found.</p>';
                return;
            }

            students.forEach((student) => {
                const item = createElement('div', 'item');
                item.innerHTML = `
            <h4>${student.name}</h4>
            <p class="muted">Email: ${student.email}</p>
            <p class="muted">Credential: ${student.studentCredential || '-'}</p>
          `;

                const viewBtn = createElement('button', 'primary', 'View Submissions');
                viewBtn.addEventListener('click', async () => {
                    const submissionData = await api(`/api/admin/students/${student._id}/submissions`);
                    const submissions = submissionData.data?.submissions || [];

                    submissionsList.innerHTML = '';
                    if (!submissions.length) {
                        submissionsList.innerHTML = '<p class="muted">No submissions for this student.</p>';
                        return;
                    }

                    submissions.forEach((submission) => {
                        const card = createElement('div', 'item');
                        card.innerHTML = `
                <h4>${submission.section?.name || 'Section'}</h4>
                <p class="muted">Score: ${submission.score} / ${submission.maxScore}</p>
                <p class="muted">Attempted: ${submission.attemptedQuestions} / ${submission.totalQuestions}</p>
                <p class="muted">Submitted: ${new Date(submission.createdAt).toLocaleString()}</p>
              `;

                        const answerGrid = createElement('div', 'answer-grid');
                        (submission.answers || []).forEach((ans, index) => {
                            const ansCard = createElement(
                                'div',
                                'answer',
                                `<strong>Q${index + 1}:</strong> ${ans.questionText}<br>
                   Selected: ${ans.selectedOptionIndex ?? 'Not answered'} | Correct: ${ans.correctOptionIndex} | Marks: ${ans.marksAwarded}`
                            );
                            answerGrid.appendChild(ansCard);
                        });

                        card.appendChild(answerGrid);
                        submissionsList.appendChild(card);
                    });
                });

                item.appendChild(viewBtn);
                studentsList.appendChild(item);
            });
        };

        document.getElementById('createSectionBtn').addEventListener('click', () => {
            createSection().catch((err) => showStatus(err.message, true));
        });

        document.getElementById('createQuestionBtn').addEventListener('click', () => {
            createQuestion().catch((err) => showStatus(err.message, true));
        });

        document.getElementById('loadQuestionsBtn').addEventListener('click', () => {
            loadQuestions().catch((err) => showStatus(err.message, true));
        });

        document.getElementById('loadStudentsBtn').addEventListener('click', () => {
            loadStudents().catch((err) => showStatus(err.message, true));
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            location.href = '/admin/login';
        });

        setupTabs();
        loadSections().catch((err) => {
            if (String(err.message || '').toLowerCase().includes('token')) {
                localStorage.removeItem('adminToken');
                location.href = '/admin/login';
                return;
            }
            showStatus(err.message, true);
        });
    </script>
</body>

</html>
