name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -z "$KEEPALIVE_URL" ]; then
            echo "RENDER_BACKEND_URL secret is not set"
            exit 1
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$KEEPALIVE_URL/api/health")
          echo "Ping status: $STATUS"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Ping failed"
            exit 1
          fi
